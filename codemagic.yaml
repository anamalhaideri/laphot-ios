workflows:
  ios-workflow:
    name: iOS Workflow
    environment:
      xcode: latest

    scripts:
      - name: Build iOS app
        script: |
          xcodebuild -workspace "LAP HOT.xcworkspace" \
          -scheme "LAP HOT" \
          -sdk iphoneos \
          -configuration Release

    artifacts:
      - build/ios/ipa/*.ipa
